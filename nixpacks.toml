# nixpacks.toml
# With package.json at the root, Nixpacks auto-detects both
# Python (requirements.txt) and Node (package.json) and sets
# both up correctly including pip and npm.
# We only need to specify the build and start commands.

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "python -m gunicorn \"backend.app:create_app()\" --bind 0.0.0.0:$PORT --workers 2 --timeout 120"